  - CLIENT__VERBOSITY={{ .Env.CLIENT__VERBOSITY }}
  - CLIENT__INSECURE={{ .Env.CLIENT__INSECURE }}

  - CLIENT__GENERATE_CONFIG={{ .Env.CLIENT__GENERATE_CONFIG }}
  - CLIENT__CONFIG_FILE={{ .Env.CLIENT__CONFIG_FILE }}

  - CLIENT__STATIC_SSH_AGENT_MAP={{ .Env.CLIENT__STATIC_SSH_AGENT_MAP }}
  - CLIENT__SSH_SOCKS={{ .Env.CLIENT__SSH_SOCKS }}
  - CLIENT__SSH_HTTP={{ .Env.CLIENT__SSH_HTTP }}
  - CLIENT__SSH_LOCAL_SOCKS_PORT={{ .Env.CLIENT__SSH_LOCAL_SOCKS_PORT }}
  - CLIENT__SSH_LOCAL_HTTP_PORT={{ .Env.CLIENT__SSH_LOCAL_HTTP_PORT }}
  - CLIENT__SSH_SSH={{ .Env.CLIENT__SSH_SSH }}
  - CLIENT__SSH_PRINT={{ .Env.CLIENT__SSH_PRINT }}
  - CLIENT__SSH_PROXY={{ .Env.CLIENT__SSH_PROXY }}
  - CLIENT__SOCKS_SOCKS={{ .Env.CLIENT__SOCKS_SOCKS }}
  - CLIENT__SSH_HTTP={{ .Env.CLIENT__SSH_HTTP }}
  - CLIENT__SOCKS_LOCAL_SOCKS_PORT={{ .Env.CLIENT__SOCKS_LOCAL_SOCKS_PORT }}
  - CLIENT__SSH_LOCAL_HTTP_PORT={{ .Env.CLIENT__SSH_LOCAL_HTTP_PORT }}
  - CLIENT__SOCKS_SSH={{ .Env.CLIENT__SOCKS_SSH }}
  - CLIENT__SOCKS_PRINT={{ .Env.CLIENT__SOCKS_PRINT }}
  - CLIENT__SOCKS_PROXY={{ .Env.CLIENT__SOCKS_PROXY }}
  - CLIENT__SCP_PRINT={{ .Env.CLIENT__SCP_PRINT }}
  - CLIENT__SCP_SOURCE={{ .Env.CLIENT__SCP_SOURCE }}
  - CLIENT__SCP_DESTINATION={{ .Env.CLIENT__SCP_DESTINATION }}
  - CLIENT__COMPILE_ID={{ .Env.CLIENT__COMPILE_ID }}
  - CLIENT__COMPILE_GOOS={{ .Env.CLIENT__COMPILE_GOOS }}
  - CLIENT__COMPILE_GOARCH={{ .Env.CLIENT__COMPILE_GOARCH }}
  - CLIENT__COMPILE_SOURCE={{ .Env.CLIENT__COMPILE_SOURCE }}
