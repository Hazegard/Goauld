  - id: "agent.dll"
    mod_timestamp: "{{ .CommitTimestamp }}"
    tool: '{{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}{{ if eq .Runtime.Goos "windows" }}./scripts/garble.bat{{ else }}./scripts/garble.sh{{ end }}{{else}}go{{end}}'
    binary: "goauld_{{ .Target }}"
    main: ./agent
    buildmode: c-shared
    hooks:
      post:
        # Make an UPX copy only when UPX=true
        - cmd: sh -c 'if [ "$(printf "%s" "${COMPRESS:-false}" | tr A-Z a-z)" = "true" ]; then cp "{{ .Path }}" "{{ .Path }}.fat"; upx --best --lzma "{{ .Path }}" || true; fi'

    env:
      - CGO_ENABLED=1
    goos:
      # - linux
      - windows
      # - darwin
    goarch:
      - amd64
      - "386"
      # - arm
      # - arm64
    flags:
      - -trimpath
      # - -buildmode=pie
    overrides:
      - goarch: amd64
        goos: windows
        env:
          - CC=x86_64-w64-mingw32-gcc
          - CXX=x86_64-w64-mingw32-g++
      - goarch: "386"
        goos: windows
        env:
          - CC=i686-w64-mingw32-gcc
          - CXX=i686-w64-mingw32-g++
      # - goarch: arm64
      #   goos: windows
      #   env:
      #     - CC=aarch64-w64-mingw32-gcc
      #     - CXX=aarch64-w64-mingw32-g++
    tags:
      - netgo
