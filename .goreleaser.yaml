# END Dynamic ENV
upx:
  - enabled: "{{.Env.COMPRESS}}"
    ids: ["agent-mini", "agent"]
    compress: "9"
    lzma: true
    brute: false

before:
  hooks:
    - go mod tidy
    - sh -c "go run ./scripts/shuffle/main.go -in ./common/crypto/pwgen/wordlist.txt -seed {{.Env.CLIENT__COMPILE_SEED}} | gzip > common/crypto/pwgen/wordlist_mini.txt.gz"
    - |
      find vendored/github.com/aus/proxyplease@v0.1.0 -path '*/.git' -prune -o \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) -print0 | LC_ALL=C sort -z | \
      sed 's|vendored/github.com/aus/proxyplease@v0.1.0/||g' | \
      tar -C vendored/github.com/aus/proxyplease@v0.1.0 --no-recursion --null -T - --uid 0 --gid 0 --numeric-owner --format pax -cf - | \
      gzip -n > vendored/github.com/aus/proxyplease@v0.1.0.tar.gz
    - |
      find vendored/github.com/hazegard/socket.io-go -path '*/.git' -prune -o \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) -print0 | LC_ALL=C sort -z | \
      sed 's|vendored/github.com/hazegard/socket.io-go/||g' | \
      tar -C vendored/github.com/hazegard/socket.io-go --no-recursion --null -T - --uid 0 --gid 0 --numeric-owner --format pax -cf - | \
      gzip -n > vendored/github.com/hazegard/socket.io-go.tar.gz
    - |
      find vendored/github.com/hazegard/togettyc -path '*/.git' -prune -o \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) -print0 | LC_ALL=C sort -z | \
      sed 's|vendored/github.com/hazegard/togettyc/||g' | \
      tar -C vendored/github.com/hazegard/togettyc --no-recursion --null -T - --uid 0 --gid 0 --numeric-owner --format pax -cf - | \
      gzip -n > vendored/github.com/hazegard/togettyc.tar.gz
    - |
      sh -c '
      if [ -z "$GOOS" ] || [ "$GOOS" = "windows" ]; then
        # if command -v zig >/dev/null 2>&1; then
        #   zig build-exe agent/sshd/shell/shim_windows/sshd_shim.zig -target x86_64-windows -O ReleaseSmall -femit-bin=agent/sshd/shell/shimembed/sshd_shim/sshd_windows_amd64.exe
        #   zig build-exe agent/sshd/shell/shim_windows/sshd_shim.zig -target aarch64-windows -O ReleaseSmall -femit-bin=agent/sshd/shell/shimembed/sshd_shim/sshd_windows_arm64.exe
        #   zig build-exe agent/sshd/shell/shim_windows/sshd_shim.zig -target x86-windows -O ReleaseSmall -femit-bin=agent/sshd/shell/shimembed/sshd_shim/sshd_windows_386.exe
        #   rm -rf agent/sshd/shell/shimembed/sshd_shim/*.pdb
        # else
        env GOOS=windows GOARCH=amd64 {{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}CLIENT__COMPILE_SEED={{.Env.CLIENT__COMPILE_SEED}} ./scripts/garble.sh{{else}}go{{end}} build -trimpath -ldflags '"'"'-s -w -buildid='"'"' -o agent/sshd/shell/shimembed/sshd_shim/sshd_windows_amd64.exe ./agent/sshd/shell/shim_windows/
        env GOOS=windows GOARCH=arm64 {{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}CLIENT__COMPILE_SEED={{.Env.CLIENT__COMPILE_SEED}} ./scripts/garble.sh{{else}}go{{end}} build -trimpath -ldflags '"'"'-s -w -buildid='"'"' -o agent/sshd/shell/shimembed/sshd_shim/sshd_windows_arm64.exe ./agent/sshd/shell/shim_windows/
        env GOOS=windows GOARCH=386 {{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}CLIENT__COMPILE_SEED={{.Env.CLIENT__COMPILE_SEED}} ./scripts/garble.sh{{else}}go{{end}} build -trimpath -ldflags '"'"'-s -w -buildid='"'"' -o agent/sshd/shell/shimembed/sshd_shim/sshd_windows_386.exe ./agent/sshd/shell/shim_windows/
        # fi
        env GOOS=windows GOARCH=arm {{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}CLIENT__COMPILE_SEED={{.Env.CLIENT__COMPILE_SEED}} ./scripts/garble.sh{{else}}go{{end}} build -trimpath -ldflags '"'"'-s -w -buildid='"'"' -o agent/sshd/shell/shimembed/sshd_shim/sshd_windows_arm.exe ./agent/sshd/shell/shim_windows/
        fi'


snapshot:
  # Allows you to change the name of the generated snapshot
  #
  # Note that some pipes require this to be semantic version compliant (nfpm,
  # for example).
  #
  # Default: `{{ .Version }}-SNAPSHOT-{{.ShortCommit}}`.
  # Templates: allowed.
  version_template: "{{ .Version }}"

builds:
  - id: "server"
    mod_timestamp: "{{ .CommitTimestamp }}"
    binary: goauld_server
    main: ./server

    env:
      - CGO_ENABLED=0
      - SERVER__HTTP_DOMAIN={{ .Env.HTTP_DOMAIN }}
      - SERVER__TLS_DOMAIN={{ .Env.TLS_DOMAIN }}
      - AGENT__HTTP_LISTEN_ADDR={{ .Env.HTTP_PORT }}
      - AGENT__HTTPS_LISTEN_ADDR={{ .Env.HTTPS_PORT }}
      - SERVER__SSHD_PORT={{ .Env.SSHD_PORT }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
#      - "386"
#      - arm
      - arm64
    flags:
      - -trimpath
      #- -buildmode=pie
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - '-X Goauld/common.Version={{.Version}}'
      - '-X Goauld/common.Commit={{.Commit}}'
      - '-X Goauld/common.Date={{.CommitDate}}'

# BEGIN Dynamic SERVER
      - '{{ if (index .Env "SERVER__AGE_PRIVKEY") }} -X Goauld/server/config._age_privKey={{ .Env.SERVER__AGE_PRIVKEY }}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_DOMAIN") }} -X Goauld/server/config._http_domain={{ .Env.SERVER__HTTP_DOMAIN }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_DOMAIN") }} -X Goauld/server/config._tls_domain={{ .Env.SERVER__TLS_DOMAIN }}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_DOMAIN") }} -X Goauld/server/config._dns_domain={{ .Env.SERVER__DNS_DOMAIN }}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_DOMAIN_ALT") }} -X Goauld/server/config._dns_domain_alt={{ .Env.SERVER__DNS_DOMAIN_ALT }}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_LISTEN_ADDR") }} -X Goauld/server/config._http_listen_addr={{ .Env.SERVER__HTTP_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__HTTPS_LISTEN_ADDR") }} -X Goauld/server/config._https_listen_addr={{ .Env.SERVER__HTTPS_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__SSHD_LISTEN_ADDR") }} -X Goauld/server/config._sshd_listen_addr={{ .Env.SERVER__SSHD_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_LISTEN_ADDR") }} -X Goauld/server/config._dns_listen_addr={{ .Env.SERVER__DNS_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__QUIC_LISTEN_ADDR") }} -X Goauld/server/config._quic_listen_addr={{ .Env.SERVER__QUIC_LISTEN_ADDR }}{{end}}'

      - '{{ if (index .Env "SERVER__TLS") }} -X Goauld/server/config._tls={{ .Env.SERVER__TLS }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_KEY") }} -X Goauld/server/config._tls_key={{ .Env.SERVER__TLS_KEY }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_CERT") }} -X Goauld/server/config._tls_cert={{ .Env.SERVER__TLS_CERT }}{{end}}'
      - '{{ if (index .Env "SERVER__QUIC") }} -X Goauld/server/config._quic={{ .Env.SERVER__QUIC }}{{end}}'
      - '{{ if (index .Env "SERVER__DNS") }} -X Goauld/server/config._dns={{ .Env.SERVER__DNS }}{{end}}'

      - '{{ if (index .Env "SERVER__NO_DB") }} -X Goauld/server/config._no_db={{ .Env.SERVER__NO_DB }}{{end}}'
      - '{{ if (index .Env "SERVER__DB_NAME") }} -X Goauld/server/config._db_name={{ .Env.SERVER__DB_NAME }}{{end}}'

      - '{{ if (index .Env "SERVER__ALLOWED_IPS") }} -X Goauld/server/config._allowed_ips={{ .Env.SERVER__ALLOWED_IPS }}{{end}}'
      - '{{ if (index .Env "SERVER__ACCESS_TOKEN") }} -X Goauld/server/config._access_token={{ .Env.SERVER__ACCESS_TOKEN }}{{end}}'
      - '{{ if (index .Env "SERVER__ADMIN_TOKEN") }} -X Goauld/server/config._admin_token={{ .Env.SERVER__ADMIN_TOKEN }}{{end}}'

      - '{{ if (index .Env "SERVER__BINARIES_BASICAUTH") }} -X Goauld/server/config._binaries_basicauth={{ .Env.SERVER__BINARIES_BASICAUTH }}{{end}}'
      - '{{ if (index .Env "SERVER__BINARIES_PATH") }} -X Goauld/server/config._binaries_path={{ .Env.SERVER__BINARIES_PATH }}{{end}}'

      - '{{ if (index .Env "SERVER__VERBOSITY") }} -X Goauld/server/config._verbosity={{ .Env.SERVER__VERBOSITY }}{{end}}'
      - '{{ if (index .Env "SERVER__QUIET") }} -X Goauld/server/config._quiet={{ .Env.SERVER__QUIET }}{{end}}'
      - '{{ if (index .Env "SERVER__VERSION") }} -X Goauld/server/config._version={{ .Env.SERVER__VERSION }}{{end}}'
      - '{{ if (index .Env "SERVER__GENERATE_CONFIG") }} -X Goauld/server/config._generate_config={{ .Env.SERVER__GENERATE_CONFIG }}{{end}}'
      - '{{ if (index .Env "SERVER__CONFIG_FILE") }} -X Goauld/server/config._config_file={{ .Env.SERVER__CONFIG_FILE }}{{end}}'

# END Dynamic SERVER
  - id: "agent"
    mod_timestamp: "{{ .CommitTimestamp }}"
    tool: '{{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}{{ if eq .Runtime.Goos "windows" }}./scripts/garble.bat{{ else }}./scripts/garble.sh{{ end }}{{else}}go{{end}}'
    binary: goauld
    main: ./agent
    env:
      - CGO_ENABLED=0
    hooks:
      post:
        # Make an UPX copy only when UPX=true
        - cmd: bash -c 'if [ "$(printf "%s" "${COMPRESS:-false}" | tr A-Z a-z)" = "true" ]; then cp "{{ .Path }}" "{{ .Path }}.fat"; fi'

    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    flags:
      - -trimpath
      #- -buildmode=pie
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - '{{ if (index .Env "AGENT__PRIVATE_PASSWORD") }} -X Goauld/agent/config._private_password={{ .Env.AGENT__PRIVATE_PASSWORD }}{{end}}'
      - '-X Goauld/common.Version={{ if (index .Env "VERSION") }}{{ .Env.VERSION }}::Tealc{{ else }}{{ .Version }}{{ end }}'
      - '-X Goauld/common.Date={{ if (index .Env "DATE") }}{{ .Env.DATE }}{{ else }}{{ .CommitDate }}{{ end }}'
      - '-X Goauld/common.Commit={{ if (index .Env "COMMIT") }}{{ .Env.COMMIT }}{{ else }}{{ .Commit }}{{ end }}'


# BEGIN Dynamic AGENT
      - '{{ if (index .Env "AGENT__AGEPUBKEY") }} -X Goauld/agent/config._agePubKey={{ .Env.AGENT__AGEPUBKEY }}{{end}}'

      - '{{ if (index .Env "AGENT__SERVER") }} -X Goauld/agent/config._server={{ .Env.AGENT__SERVER }}{{end}}'
      - '{{ if (index .Env "AGENT__SSH_SERVER") }} -X Goauld/agent/config._ssh_server={{ .Env.AGENT__SSH_SERVER }}{{end}}'
      - '{{ if (index .Env "AGENT__QUIC_DOMAIN") }} -X Goauld/agent/config._quic_domain={{ .Env.AGENT__QUIC_DOMAIN }}{{end}}'
