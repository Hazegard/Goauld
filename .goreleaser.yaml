  - CLIENT__COMPILE_OUTPUT={{ .Env.CLIENT__COMPILE_OUTPUT }}
  - CLIENT__VERBOSITY={{ .Env.CLIENT__VERBOSITY }}
  - CLIENT__COMPILE_DROP_ENV={{ .Env.CLIENT__COMPILE_DROP_ENV }}
  - CLIENT__COMPILE_SEED={{ .Env.CLIENT__COMPILE_SEED }}
  - CLIENT__COMPILE_PRIVATE_PASSWORD={{ .Env.CLIENT__COMPILE_PRIVATE_PASSWORD }}


before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    # - go generate ./...


builds:
  - id: "server"
    mod_timestamp: "{{ .CommitTimestamp }}"
    binary: goauld_server
    main: ./server

    env:
      - CGO_ENABLED=0
      - SERVER__HTTP_DOMAIN={{ .Env.HTTP_DOMAIN }}
      - SERVER__TLS_DOMAIN={{ .Env.TLS_DOMAIN }}
      - AGENT__HTTP_LISTEN_ADDR={{ .Env.HTTP_PORT }}
      - AGENT__HTTPS_LISTEN_ADDR={{ .Env.HTTPS_PORT }}
      - SERVER__SSHD_PORT={{ .Env.SSHD_PORT }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
#      - "386"
#      - arm
      - arm64
    flags:
      - -trimpath
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - -X Goauld/common.version={{.Version}} -X Goauld/common.commit={{.Commit}} -X Goauld/common.date={{.CommitDate}}


      - '{{ if (index .Env "SERVER__AGE_PRIVKEY") }} -X Goauld/server/config._age_privKey={{ .Env.SERVER__AGE_PRIVKEY }}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_DOMAIN") }} -X Goauld/server/config._http_domain={{ .Env.SERVER__HTTP_DOMAIN }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_DOMAIN") }} -X Goauld/server/config._tls_domain={{ .Env.SERVER__TLS_DOMAIN }}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_LISTEN_ADDR") }} -X Goauld/server/config._http_listen_addr={{ .Env.SERVER__HTTP_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__HTTPS_LISTEN_ADDR") }} -X Goauld/server/config._https_listen_addr={{ .Env.SERVER__HTTPS_LISTEN_ADDR }}{{end}}'
      - '{{ if (index .Env "SERVER__SSHD_LISTEN_ADDR") }} -X Goauld/server/config._sshd_listen_addr={{ .Env.SERVER__SSHD_LISTEN_ADDR }}{{end}}'

      - '{{ if (index .Env "SERVER__VERBOSITY") }} -X Goauld/server/config._verbosity={{ .Env.SERVER__VERBOSITY }}{{end}}'

      - '{{ if (index .Env "SERVER__TLS") }} -X Goauld/server/config._tls={{ .Env.SERVER__TLS }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_KEY") }} -X Goauld/server/config._tls_key={{ .Env.SERVER__TLS_KEY }}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_CERT") }} -X Goauld/server/config._tls_cert={{ .Env.SERVER__TLS_CERT }}{{end}}'

      - '{{ if (index .Env "SERVER__NO_DB") }} -X Goauld/server/config._no_db={{ .Env.SERVER__NO_DB }}{{end}}'
      - '{{ if (index .Env "SERVER__DB_NAME") }} -X Goauld/server/config._db_name={{ .Env.SERVER__DB_NAME }}{{end}}'

      - '{{ if (index .Env "SERVER__ALLOWED_IPS") }} -X Goauld/server/config._allowed_ips={{ .Env.SERVER__ALLOWED_IPS }}{{end}}'
      - '{{ if (index .Env "SERVER__ACCESS_TOKEN") }} -X Goauld/server/config._access_token={{ .Env.SERVER__ACCESS_TOKEN }}{{end}}'
      - '{{ if (index .Env "SERVER__ACCESS_TOKEN") }} -X Goauld/server/config._access_token={{ .Env.SERVER__ACCESS_TOKEN }}{{end}}'

      - '{{ if (index .Env "SERVER__BINARIES_BASICAUTH") }} -X Goauld/server/config._binaries_basicauth={{ .Env.SERVER__BINARIES_BASICAUTH }}{{end}}'
      - '{{ if (index .Env "SERVER__BINARIES_PATH") }} -X Goauld/server/config._binaries_path={{ .Env.SERVER__BINARIES_PATH }}{{end}}'

      - '{{ if (index .Env "SERVER__GENERATE_CONFIG") }} -X Goauld/server/config._generate_config={{ .Env.SERVER__GENERATE_CONFIG }}{{end}}'
      - '{{ if (index .Env "SERVER__CONFIG_FILE") }} -X Goauld/server/config._config_file={{ .Env.SERVER__CONFIG_FILE }}{{end}}'
  - id: "agent"
    mod_timestamp: "{{ .CommitTimestamp }}"
    tool: '{{ if eq .Runtime.Goos "windows" }}./scripts/garble.bat{{ else }}./scripts/garble.sh{{ end }}'
    binary: goauld
    main: ./agent
    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    flags:
      - -trimpath
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - '{{ if (index .Env "AGENT__PRIVATE_PASSWORD") }} -X Goauld/agent/config._private_password={{ .Env.AGENT__PRIVATE_PASSWORD }}{{end}}'
      - -X Goauld/common.version={{.Version}} -X Goauld/common.commit={{.Commit}} -X Goauld/common.date={{.CommitDate}}


      - '{{ if (index .Env "AGENT__AGEPUBKEY") }} -X Goauld/agent/config._agePubKey={{ .Env.AGENT__AGEPUBKEY }}{{end}}'

      - '{{ if (index .Env "AGENT__SERVER") }} -X Goauld/agent/config._server={{ .Env.AGENT__SERVER }}{{end}}'
      - '{{ if (index .Env "AGENT__SSH_SERVER") }} -X Goauld/agent/config._ssh_server={{ .Env.AGENT__SSH_SERVER }}{{end}}'
      - '{{ if (index .Env "AGENT__TLS_SERVER") }} -X Goauld/agent/config._tls_server={{ .Env.AGENT__TLS_SERVER }}{{end}}'

      - '{{ if (index .Env "AGENT__SHARED_PASSWORD") }} -X Goauld/agent/config._shared_password={{ .Env.AGENT__SHARED_PASSWORD }}{{end}}'
      - '{{ if (index .Env "AGENT__NAME") }} -X Goauld/agent/config._name={{ .Env.AGENT__NAME }}{{end}}'

      - '{{ if (index .Env "AGENT__SSHD_ENABLED") }} -X Goauld/agent/config._sshd_enabled={{ .Env.AGENT__SSHD_ENABLED }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_ENABLED") }} -X Goauld/agent/config._socks_enabled={{ .Env.AGENT__SOCKS_ENABLED }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PROXY_ENABLED") }} -X Goauld/agent/config._http_proxy_enabled={{ .Env.AGENT__HTTP_PROXY_ENABLED }}{{end}}'

      - '{{ if (index .Env "AGENT__PROXY") }} -X Goauld/agent/config._proxy={{ .Env.AGENT__PROXY }}{{end}}'
      - '{{ if (index .Env "AGENT__PROXY_USERNAME") }} -X Goauld/agent/config._proxy_username={{ .Env.AGENT__PROXY_USERNAME }}{{end}}'
      - '{{ if (index .Env "AGENT__PROXY_PASSWORD") }} -X Goauld/agent/config._proxy_password={{ .Env.AGENT__PROXY_PASSWORD }}{{end}}'
      - '{{ if (index .Env "AGENT__PROXY_DOMAIN") }} -X Goauld/agent/config._proxy_domain={{ .Env.AGENT__PROXY_DOMAIN }}{{end}}'

      - '{{ if (index .Env "AGENT__SOCKS_CUSTOM_PROXY") }} -X Goauld/agent/config._socks_custom_proxy={{ .Env.AGENT__SOCKS_CUSTOM_PROXY }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_USE_SYSTEM_PROXY") }} -X Goauld/agent/config._socks_use_system_proxy={{ .Env.AGENT__SOCKS_USE_SYSTEM_PROXY }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_PROXY_USERNAME") }} -X Goauld/agent/config._socks_proxy_username={{ .Env.AGENT__SOCKS_PROXY_USERNAME }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_PROXY_PASSWORD") }} -X Goauld/agent/config._socks_proxy_password={{ .Env.AGENT__SOCKS_PROXY_PASSWORD }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_PROXY_DOMAIN") }} -X Goauld/agent/config._socks_proxy_domain={{ .Env.AGENT__SOCKS_PROXY_DOMAIN }}{{end}}'

      - '{{ if (index .Env "AGENT__HTTP_CUSTOM_PROXY") }} -X Goauld/agent/config._http_custom_proxy={{ .Env.AGENT__HTTP_CUSTOM_PROXY }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PROXY_USERNAME") }} -X Goauld/agent/config._http_proxy_username={{ .Env.AGENT__HTTP_PROXY_USERNAME }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PROXY_PASSWORD") }} -X Goauld/agent/config._http_proxy_password={{ .Env.AGENT__HTTP_PROXY_PASSWORD }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PROXY_DOMAIN") }} -X Goauld/agent/config._http_proxy_domain={{ .Env.AGENT__HTTP_PROXY_DOMAIN }}{{end}}'


      - '{{ if (index .Env "AGENT__NO_PROXY") }} -X Goauld/agent/config._no_proxy={{ .Env.AGENT__NO_PROXY }}{{end}}'

      - '{{ if (index .Env "AGENT__RSSH_PORT") }} -X Goauld/agent/config._rssh_port={{ .Env.AGENT__RSSH_PORT }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_PORT") }} -X Goauld/agent/config._socks_port={{ .Env.AGENT__SOCKS_PORT }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PORT") }} -X Goauld/agent/config._http_port={{ .Env.AGENT__HTTP_PORT }}{{end}}'

      - '{{ if (index .Env "AGENT__KEEPALIVE") }} -X Goauld/agent/config._keepalive={{ .Env.AGENT__KEEPALIVE }}{{end}}'
      - '{{ if (index .Env "AGENT__VERBOSITY") }} -X Goauld/agent/config._verbosity={{ .Env.AGENT__VERBOSITY }}{{end}}'

      - '{{ if (index .Env "AGENT__RSSH_ORDER") }} -X Goauld/agent/config._rssh_order={{ .Env.AGENT__RSSH_ORDER }}{{end}}'

      - '{{ if (index .Env "AGENT__REMOTE_PORT_FORWARDING") }} -X Goauld/agent/config._remote_port_forwarding={{ .Env.AGENT__REMOTE_PORT_FORWARDING }}{{end}}'

      - '{{ if (index .Env "AGENT__MAX_RETRIES") }} -X Goauld/agent/config._max_retries={{ .Env.AGENT__MAX_RETRIES }}{{end}}'

      - '{{ if (index .Env "AGENT__GENERATE_CONFIG") }} -X Goauld/agent/config._generate_config={{ .Env.AGENT__GENERATE_CONFIG }}{{end}}'
      - '{{ if (index .Env "AGENT__CONFIG_FILE") }} -X Goauld/agent/config._config_file={{ .Env.AGENT__CONFIG_FILE }}{{end}}'

      - '{{ if (index .Env "AGENT__BACKGROUND") }} -X Goauld/agent/config._background={{ .Env.AGENT__BACKGROUND }}{{end}}'

  - id: "client"
    mod_timestamp: "{{ .CommitTimestamp }}"
    binary: tealc
    main: ./client
    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      # - "386"
      # - arm
      - arm64
    flags:
      - -trimpath
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - -X Goauld/common.version={{.Version}} -X Goauld/common.commit={{.Commit}} -X Goauld/common.date={{.CommitDate}}


      - '{{ if (index .Env "CLIENT__SERVER") }} -X main._server={{ .Env.CLIENT__SERVER }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_SERVER") }} -X main._ssh_server={{ .Env.CLIENT__SSH_SERVER }}{{end}}'

      - '{{ if (index .Env "CLIENT__ACCESS_TOKEN") }} -X main._access_token={{ .Env.CLIENT__ACCESS_TOKEN }}{{end}}'

      - '{{ if (index .Env "CLIENT__VERBOSITY") }} -X main._verbosity={{ .Env.CLIENT__VERBOSITY }}{{end}}'
      - '{{ if (index .Env "CLIENT__INSECURE") }} -X main._insecure={{ .Env.CLIENT__INSECURE }}{{end}}'

      - '{{ if (index .Env "CLIENT__GENERATE_CONFIG") }} -X main._generate_config={{ .Env.CLIENT__GENERATE_CONFIG }}{{end}}'
      - '{{ if (index .Env "CLIENT__CONFIG_FILE") }} -X main._config_file={{ .Env.CLIENT__CONFIG_FILE }}{{end}}'

      - '{{ if (index .Env "CLIENT__STATIC_SSH_AGENT_MAP") }} -X main._static_ssh_agent_map={{ .Env.CLIENT__STATIC_SSH_AGENT_MAP }}{{end}}'

      - '{{ if (index .Env "CLIENT__SSH_SOCKS") }} -X main._ssh_socks={{ .Env.CLIENT__SSH_SOCKS }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_HTTP") }} -X main._ssh_http={{ .Env.CLIENT__SSH_HTTP }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_LOCAL_SOCKS_PORT") }} -X main._ssh_local_socks_port={{ .Env.CLIENT__SSH_LOCAL_SOCKS_PORT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_LOCAL_HTTP_PORT") }} -X main._ssh_local_http_port={{ .Env.CLIENT__SSH_LOCAL_HTTP_PORT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_SSH") }} -X main._ssh_ssh={{ .Env.CLIENT__SSH_SSH }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_PRINT") }} -X main._ssh_print={{ .Env.CLIENT__SSH_PRINT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_PROXY") }} -X main._ssh_proxy={{ .Env.CLIENT__SSH_PROXY }}{{end}}'

      - '{{ if (index .Env "CLIENT__SOCKS_SOCKS") }} -X main._socks_socks={{ .Env.CLIENT__SOCKS_SOCKS }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_HTTP") }} -X main._ssh_http={{ .Env.CLIENT__SSH_HTTP }}{{end}}'
      - '{{ if (index .Env "CLIENT__SOCKS_LOCAL_SOCKS_PORT") }} -X main._socks_local_socks_port={{ .Env.CLIENT__SOCKS_LOCAL_SOCKS_PORT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SSH_LOCAL_HTTP_PORT") }} -X main._ssh_local_http_port={{ .Env.CLIENT__SSH_LOCAL_HTTP_PORT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SOCKS_SSH") }} -X main._socks_ssh={{ .Env.CLIENT__SOCKS_SSH }}{{end}}'
      - '{{ if (index .Env "CLIENT__SOCKS_PRINT") }} -X main._socks_print={{ .Env.CLIENT__SOCKS_PRINT }}{{end}}'
      - '{{ if (index .Env "CLIENT__SOCKS_PROXY") }} -X main._socks_proxy={{ .Env.CLIENT__SOCKS_PROXY }}{{end}}'

      - '{{ if (index .Env "CLIENT__SCP_PRINT") }} -X main._scp_print={{ .Env.CLIENT__SCP_PRINT }}{{end}}'
