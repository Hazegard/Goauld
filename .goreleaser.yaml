      - '{{ if (index .Env "AGENT__DNS_SERVER") }} -X Goauld/agent/config._dns_server={{ .Env.AGENT__DNS_SERVER }}{{end}}'
      - '{{ if (index .Env "AGENT__DNS_DOMAIN") }} -X Goauld/agent/config._dns_domain={{ .Env.AGENT__DNS_DOMAIN }}{{end}}'

