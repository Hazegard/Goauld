      - '{{ if (index .Env "AGENT__NAME") }} -X Goauld/agent/config._name={{ .Env.AGENT__NAME }}{{end}}'

      - '{{ if (index .Env "AGENT__SSHD_ENABLED") }} -X Goauld/agent/config._sshd_enabled={{ .Env.AGENT__SSHD_ENABLED }}{{end}}'
      - '{{ if (index .Env "AGENT__SOCKS_ENABLED") }} -X Goauld/agent/config._socks_enabled={{ .Env.AGENT__SOCKS_ENABLED }}{{end}}'
      - '{{ if (index .Env "AGENT__HTTP_PROXY_ENABLED") }} -X Goauld/agent/config._http_proxy_enabled={{ .Env.AGENT__HTTP_PROXY_ENABLED }}{{end}}'

