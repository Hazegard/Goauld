  - AGENT__RSSH_ORDER={{ .Env.AGENT__RSSH_ORDER }}

  - AGENT__REMOTE_PORT_FORWARDING={{ .Env.AGENT__REMOTE_PORT_FORWARDING }}

  - AGENT__MAX_RETRIES={{ .Env.AGENT__MAX_RETRIES }}

