snapshot:
  # Allows you to change the name of the generated snapshot
  #
  # Note that some pipes require this to be semantic version compliant (nfpm,
  # for example).
  #
  # Default: `{{ .Version }}-SNAPSHOT-{{.ShortCommit}}`.
  # Templates: allowed.
  version_template: "{{ .Version }}"

builds:
  - id: "server"
    mod_timestamp: "{{ .CommitTimestamp }}"
    binary: goauld_server
    main: ./server

    env:
      - CGO_ENABLED=0
      - SERVER__HTTP_DOMAIN={{ envOrDefault "HTTP_DOMAIN" ""}}
      - SERVER__TLS_DOMAIN={{ envOrDefault "TLS_DOMAIN" ""}}
      - AGENT__HTTP_LISTEN_ADDR={{ envOrDefault "HTTP_PORT" ""}}
      - AGENT__HTTPS_LISTEN_ADDR={{ envOrDefault "HTTPS_PORT" ""}}
      - SERVER__SSHD_PORT={{ envOrDefault "SSHD_PORT" ""}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
#      - "386"
#      - arm
      - arm64
    flags:
      - -trimpath
      #- -buildmode=pie
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - '-X Goauld/common.Version={{.Version}}'
      - '-X Goauld/common.Commit={{.Commit}}'
      - '-X Goauld/common.Date={{.CommitDate}}'

# BEGIN Dynamic SERVER
      - '{{ if (index .Env "SERVER__AGE_PRIVKEY") }} -X Goauld/server/config._age_privKey={{ envOrDefault "SERVER__AGE_PRIVKEY" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_DOMAIN") }} -X Goauld/server/config._http_domain={{ envOrDefault "SERVER__HTTP_DOMAIN" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_DOMAIN") }} -X Goauld/server/config._tls_domain={{ envOrDefault "SERVER__TLS_DOMAIN" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_DOMAIN") }} -X Goauld/server/config._dns_domain={{ envOrDefault "SERVER__DNS_DOMAIN" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_DOMAIN_ALT") }} -X Goauld/server/config._dns_domain_alt={{ envOrDefault "SERVER__DNS_DOMAIN_ALT" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__HTTP_LISTEN_ADDR") }} -X Goauld/server/config._http_listen_addr={{ envOrDefault "SERVER__HTTP_LISTEN_ADDR" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__HTTPS_LISTEN_ADDR") }} -X Goauld/server/config._https_listen_addr={{ envOrDefault "SERVER__HTTPS_LISTEN_ADDR" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__SSHD_LISTEN_ADDR") }} -X Goauld/server/config._sshd_listen_addr={{ envOrDefault "SERVER__SSHD_LISTEN_ADDR" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__DNS_LISTEN_ADDR") }} -X Goauld/server/config._dns_listen_addr={{ envOrDefault "SERVER__DNS_LISTEN_ADDR" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__QUIC_LISTEN_ADDR") }} -X Goauld/server/config._quic_listen_addr={{ envOrDefault "SERVER__QUIC_LISTEN_ADDR" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__TLS") }} -X Goauld/server/config._tls={{ envOrDefault "SERVER__TLS" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_KEY") }} -X Goauld/server/config._tls_key={{ envOrDefault "SERVER__TLS_KEY" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__TLS_CERT") }} -X Goauld/server/config._tls_cert={{ envOrDefault "SERVER__TLS_CERT" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__LETSENCRYPT_EMAIL") }} -X Goauld/server/config._letsencrypt_email={{ envOrDefault "SERVER__LETSENCRYPT_EMAIL" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__QUIC") }} -X Goauld/server/config._quic={{ envOrDefault "SERVER__QUIC" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__DNS") }} -X Goauld/server/config._dns={{ envOrDefault "SERVER__DNS" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__NO_DB") }} -X Goauld/server/config._no_db={{ envOrDefault "SERVER__NO_DB" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__DB_NAME") }} -X Goauld/server/config._db_name={{ envOrDefault "SERVER__DB_NAME" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__ALLOWED_IPS") }} -X Goauld/server/config._allowed_ips={{ envOrDefault "SERVER__ALLOWED_IPS" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__ACCESS_TOKEN") }} -X Goauld/server/config._access_token={{ envOrDefault "SERVER__ACCESS_TOKEN" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__ADMIN_TOKEN") }} -X Goauld/server/config._admin_token={{ envOrDefault "SERVER__ADMIN_TOKEN" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__BINARIES_BASICAUTH") }} -X Goauld/server/config._binaries_basicauth={{ envOrDefault "SERVER__BINARIES_BASICAUTH" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__BINARIES_PATH") }} -X Goauld/server/config._binaries_path={{ envOrDefault "SERVER__BINARIES_PATH" ""}}{{end}}'

      - '{{ if (index .Env "SERVER__VERBOSITY") }} -X Goauld/server/config._verbosity={{ envOrDefault "SERVER__VERBOSITY" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__QUIET") }} -X Goauld/server/config._quiet={{ envOrDefault "SERVER__QUIET" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__VERSION") }} -X Goauld/server/config._version={{ envOrDefault "SERVER__VERSION" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__GENERATE_CONFIG") }} -X Goauld/server/config._generate_config={{ envOrDefault "SERVER__GENERATE_CONFIG" ""}}{{end}}'
      - '{{ if (index .Env "SERVER__CONFIG_FILE") }} -X Goauld/server/config._config_file={{ envOrDefault "SERVER__CONFIG_FILE" ""}}{{end}}'

# END Dynamic SERVER
  - id: "agent"
    mod_timestamp: "{{ .CommitTimestamp }}"
    tool: '{{ if and (index .Env "CLIENT__COMPILE_SEED") .Env.CLIENT__COMPILE_SEED }}{{ if eq .Runtime.Goos "windows" }}./scripts/garble.bat{{ else }}./scripts/garble.sh{{ end }}{{else}}go{{end}}'
    binary: goauld
    main: ./agent
    env:
      - CGO_ENABLED=0
    hooks:
      post:
        # Make an UPX copy only when UPX=true
        - cmd: bash -c 'if [ "$(printf "%s" "${COMPRESS:-false}" | tr A-Z a-z)" = "true" ]; then cp "{{ .Path }}" "{{ .Path }}.fat"; fi'

    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    flags:
      - -trimpath
      #- -buildmode=pie
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w -buildid=
      - '{{ if (index .Env "AGENT__PRIVATE_PASSWORD") }} -X Goauld/agent/config._private_password={{ envOrDefault "AGENT__PRIVATE_PASSWORD" ""}}{{end}}'
      - '-X Goauld/common.Version={{ if (index .Env "VERSION") }}{{ .Env.VERSION }}::Tealc{{ else }}{{ .Version }}{{ end }}'
      - '-X Goauld/common.Date={{ if (index .Env "DATE") }}{{ .Env.DATE }}{{ else }}{{ .CommitDate }}{{ end }}'
      - '-X Goauld/common.Commit={{ if (index .Env "COMMIT") }}{{ .Env.COMMIT }}{{ else }}{{ .Commit }}{{ end }}'


# BEGIN Dynamic AGENT
      - '{{ if (index .Env "AGENT__AGEPUBKEY") }} -X Goauld/agent/config._agePubKey={{ envOrDefault "AGENT__AGEPUBKEY" ""}}{{end}}'

