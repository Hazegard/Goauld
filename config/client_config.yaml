#HTTP Server to connect to.
server: https://www.example.com

# SSH Server to connect to.
ssh-server: www.example.com:22222

# Access token required to access the /manage/ endpoint.
access-token: a23YiXyAZzrPlc8oWXqlSK2z7d8COQn1gGuti6KLfF5HHhZt

# Admin token required to access the /admin/ endpoint.
admin-token: moVmzz5aTuptalF26SnlCkwdZ5MUyX9h7xRv8BXS79LoRThi

# Verbosity. Repeat to increase
verbose: 0

# Allow insecure connection (do not validate TLS certificate).
insecure: false

# Show version information
version: false

# Generate configuration file based on the current options.
generate-config: false

# Configuration file to use.
config-file: ""

# Agent password map.
agent-password: {}

# Agent password.
password: ""

# Connect to the agent through SSH.
ssh:
  target: ""
  #Forward the SOCKS ports on the local host.
  socks: true
  #Forward the HTTP proxy ports on the local host.
  http: true
  #Local port to bind the SOCKS to.
  socks-port: 1080
  #Local port to bind the SOCKS to.
  http-port: 3128
  #Connect to the agent SSHD service.
  ssh: true
  #Show the SSH command instead of executing it.
  print: false
  #Enable direct STDIN/STDOUT connections to Allow to use proxycommand.
  proxy: false
  sshargs: []

# Mount the socks server exposed by the agent.
socks:
  target: ""
  #Forward the SOCKS ports on the local host.
  socks: true
  #Forward the HTTP proxy ports on the local host.
  http: true
  #Local port to bind the SOCKS to.
  socks-port: 1080
  #Local port to bind the SOCKS to.
  http-port: 3128
  #Connect to the agent SSHD service.
  ssh: false
  #Show the SSH command instead of executing it.
  print: false
  #Enable direct STDIN/STDOUT connections to Allow to use proxycommand.
  proxy: false
  sshargs: []

# Transfer files using SCP from/to the agent.
scp:
  target: ""
  #Show the SSH command instead of executing it.
  print: false
  #Origin copy.
  source: ""
  #Destination to copy.
  destination: ""
  scpargs: []

# TUI used to manage the connected agents
tui: {}

# Retrieve the passwords used to connect to the agent.
pass:
  #Agent name to retrieve password.
  agent: ""
  #Password to retrieve (OTP/Agent).
  type: ""
  args: []

# Compile the agent.
compile: {}

# Admin command.
admin:
  dump: {}
  loglevel:
    level: ""
  config: {}
  state: {}

