# Age public key associated to the server
age-pubkey: ""

# Configuration file to use.
config-file: ""

# Seconds between two keepalive messages in seconds).
keepalive: 20

# Max retries before giving up
max-retries: 0

# Nice name to identify the agent.
name: user@hostname

# Don't use the system proxy'
no-proxy: false

# SSH password to access the agent.
password: ""

# Use the provided proxy to connect the control server.
proxy: ""

# Ports to forward to the server (REMOTE_PORT[:LOCAL_IP]:LOCAL_PORT).
rpf: []

# Order of ssh connection attempts.
rssh-order:
  - ssh
  - tls
  - ws
  - http

# Remote port to bind to, 0 => Random.
rssh-port: 0

# HTTP Server to connect to.
server: localhost

# Start the Socks server.
socks: true

# Remote port to bind to, 0 => Random.
socks-port: 0

# Use the proxy on the underlying system if applicable for all requests going through the socks proxy.
socks-proxy: true

# SSH Server to connect to.
ssh-server: localhost:2222

# Start the SSHD server.
sshd: true

# TLS Server to connect to.
tls-server: localhost

# Verbosity. Repeat to increase
verbose: 0

